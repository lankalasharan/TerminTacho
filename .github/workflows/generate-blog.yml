name: Auto Generate Blog Post

on:
  schedule:
    # Daily at 08:00 UTC. The script enforces exact 15-day cadence.
    - cron: "0 8 * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: |
          npm ci || npm install --no-audit --no-fund

      - name: Validate required secrets
        run: |
          test -n "$DATABASE_URL" || (echo "Missing DATABASE_URL secret" && exit 1)
          test -n "$GEMINI_API_KEY" || (echo "Missing GEMINI_API_KEY secret" && exit 1)
          test -n "$SITE_URL" || (echo "Missing SITE_URL secret" && exit 1)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Generate and publish blog post
        run: npm run blog:generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BLOG_GENERATE_SECRET: ${{ secrets.BLOG_GENERATE_SECRET }}
          SITE_URL: ${{ secrets.SITE_URL }}
          FORCE_BLOG_GENERATION: "true"
